services:

  # ── NGINX — Web Server ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ejournal_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ejournal_network

  # ── APP — Laravel PHP-FPM ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ejournal_app
    env_file: .env.docker
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ejournal_network

  # ── POSTGRESQL — Database ──────────────────────────────────────────────────
  # Menggantikan MySQL. PostgreSQL lebih robust untuk data akademik &
  # mendukung full-text search yang berguna untuk pencarian metadata jurnal.
  postgres:
    image: postgres:16-alpine
    container_name: ejournal_postgres
    environment:
      POSTGRES_DB: ejournal
      POSTGRES_USER: ejournal_user
      POSTGRES_PASSWORD: ejournal_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejournal_user -d ejournal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ejournal_network

  # ── REDIS — Cache & Queue ──────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: ejournal_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ejournal_network

  # ── QUEUE WORKER — Proses antrian email ───────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ejournal_queue
    env_file: .env.docker
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - .:/var/www/html
    depends_on:
      - redis
      - postgres
    networks:
      - ejournal_network
    restart: unless-stopped

  # ── SCHEDULER — Cron Laravel ───────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ejournal_scheduler
    env_file: .env.docker
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - ejournal_network
    restart: unless-stopped

  # ── MAILPIT — Mail Catcher (Development) ──────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ejournal_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ejournal_network

# ── VOLUMES ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── NETWORKS ───────────────────────────────────────────────────────────────
networks:
  ejournal_network:
    driver: bridge
