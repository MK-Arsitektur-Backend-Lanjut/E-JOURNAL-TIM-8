services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_uts_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secret}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=digital_library
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel
    depends_on:
      - db
      - redis
    networks:
      - backend_uts_network

  nginx:
    image: nginx:1.27-alpine
    container_name: backend_uts_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend_uts_network

  db:
    image: mysql:8.4
    container_name: backend_uts_db
    environment:
      MYSQL_DATABASE: digital_library
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_uts_network

  # Tambahan dari Modul 3
  redis:
    image: redis:alpine
    container_name: backend_uts_redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-secret}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend_uts_network

volumes:
  db_data:

networks:
  backend_uts_network:
    driver: bridge
