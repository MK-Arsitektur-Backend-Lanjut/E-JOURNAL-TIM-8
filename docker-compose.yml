services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_uts_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - backend_uts_network

  nginx:
    image: nginx:1.27-alpine
    container_name: backend_uts_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend_uts_network

  db:
    image: mysql:8.4
    container_name: backend_uts_db
    environment:
      MYSQL_DATABASE: digital_library
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_uts_network

volumes:
  db_data:

networks:
  backend_uts_network:
    driver: bridge
