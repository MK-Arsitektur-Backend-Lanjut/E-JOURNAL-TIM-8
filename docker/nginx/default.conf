server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Handle semua request ke index.php (Laravel routing)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proses file PHP via PHP-FPM (container app)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blokir akses ke file tersembunyi (.env, .git, dsb.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Konfigurasi upload (untuk file jurnal)
    client_max_body_size 50M;
}
